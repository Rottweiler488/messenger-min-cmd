name: CD application

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
    paths-ignore:
      - 'LICENSE'
      - '**.md'
      - '.github/**'
      - '!.github/workdlows/CD-app.yml'
    workflow_dispacth:
      inputs:
        reason:
          description: "Name the reason"
          default: "Update"
          required: true
        version:
          description: 'Version'
          required: true
          default: 'latest'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-lates
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: messenger-min
          path: build/libs/

      - name: Login in Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build/push/action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERUSERNAME }}/messenger-min-app:prod

      - name: Update Stack Portainer
        run: curl -X POST "${{ secrets.PORTAINER_WEBHOOK }}"