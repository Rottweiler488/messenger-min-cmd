name: CD application

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
      - feature/ci-cd
    paths-ignore:
      - 'LICENSE'
      - '**.md'
      - '.github/**'
      - '!.github/workflows/CD-app.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: "Name the reason"
        default: "Update"
        required: true
      version:
        description: 'Version'
        required: true
        default: 'latest'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assemble --build-cache

      - name: Login in Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/messenger-min-app:prod

      - name: Update Stack Portainer
        run: curl -X POST "${{ secrets.PORTAINER_WEBHOOK }}"